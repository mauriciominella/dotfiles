# ──────────────────────────────────────────────────────────────
#  Terminal
# ──────────────────────────────────────────────────────────────
set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',*256col*:Tc'
set -ga terminal-overrides ',xterm-256color:Tc'
set -sg escape-time 0

# ──────────────────────────────────────────────────────────────
#  Prefix / general
# ──────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind-key C-a last-pane

setw -g mode-keys vi
set -g @shell_mode 'vi'

set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set-option -g mouse on

# Preventing scrolling after copying
unbind -T copy-mode-vi MouseDragEnd1Pane

# ──────────────────────────────────────────────────────────────
#  Pane / window navigation
#  C-h/j/k/l smart-switching is handled by vim-tmux-navigator below.
# ──────────────────────────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind-key -r C-h select-window -t :-
bind-key -r C-l select-window -t :+

bind -n S-Left  resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Down  resize-pane -D 1
bind -n S-Up    resize-pane -U 1

bind-key u split-window -v -c '#{pane_current_path}'
bind-key o split-window -h -c '#{pane_current_path}'
bind-key c new-window     -c '#{pane_current_path}'

bind-key t split-window -h "vim"
bind-key K run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# ──────────────────────────────────────────────────────────────
#  Agent / pane notifications
#  Bell-based: when a pane finishes (or Claude Code's Stop /
#  Notification hook fires), the window flashes in the status bar.
#  Silence-based: toggle per-window "alert me when this pane has
#  been quiet for N seconds" — useful when an agent is idle.
# ──────────────────────────────────────────────────────────────
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off
set -g visual-silence on

# Activity monitoring stays off by default — agents stream output
# constantly, so it would fire too often. Toggle per-window with
# prefix + m if you want it for a specific pane.
setw -g monitor-activity off
set  -g visual-activity off

bind-key b if-shell '[ "$(tmux show -wv monitor-silence)" = "0" ]' \
  'setw monitor-silence 30 ; display "silence-alert: ON (30s)"' \
  'setw monitor-silence 0  ; display "silence-alert: OFF"'

bind-key m if-shell '[ "$(tmux show -wv monitor-activity)" = "off" ]' \
  'setw monitor-activity on  ; display "activity-alert: ON"' \
  'setw monitor-activity off ; display "activity-alert: OFF"'


# ──────────────────────────────────────────────────────────────
#  Settings for Claude code 
#  The allow-passthrough line lets notifications and progress updates reach the outer terminal instead of being swallowed by tmux. The extended-keys lines let tmux distinguish Shift+Enter from plain Enter so the newline shortcut works.
# ──────────────────────────────────────────────────────────────
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ──────────────────────────────────────────────────────────────
#  Copy mode (macOS — pbcopy)
# ──────────────────────────────────────────────────────────────
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ──────────────────────────────────────────────────────────────
#  Status bar (Solarized)
# ──────────────────────────────────────────────────────────────
set -g status on
set -g status-bg '#586e75'
set -g status-fg '#eee8d5'
set -g status-justify centre
set -g status-left  'Session: #S'
set -g status-right ''
set -g status-left-length 50

set-window-option -g window-status-current-format \
  ' #[fg=white]** #[fg=white,bold][#{window_index}] #[fg=green]#{pane_current_command} #[fg=cyan]#(pwd="#{pane_current_path}"; echo ${pwd####*/}) #[fg=white]**'
set-window-option -g window-status-format \
  '#[fg=colour244,bold][#{window_index}] #[fg=colour244]#{pane_current_command} #[fg=colour244]#(pwd="#{pane_current_path}"; echo ${pwd####*/})'

# Loud styling for windows with a bell / silence / activity flag —
# this is how you know an agent in another window needs you.
set -g window-status-bell-style     'fg=#fdf6e3,bg=#dc322f,bold'
set -g window-status-activity-style 'fg=#073642,bg=#b58900,bold'

# ──────────────────────────────────────────────────────────────
#  Plugins (TPM)
#  Install with: prefix + I    Update: prefix + U
# ──────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

# Smart pane switching that's aware of vim/nvim splits.
# Replaces the old hand-rolled is_vim block.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Fast fzf-based session picker — invaluable when juggling
# multiple agent sessions.  prefix + O  to open.
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'O'
set -g @sessionx-window-mode 'on'

# Persistence
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-strategy-vim  'session'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (keep at the very bottom).
run-shell '~/.tmux/plugins/tpm/tpm'
