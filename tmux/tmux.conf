# ──────────────────────────────────────────────────────────────
#  Terminal
# ──────────────────────────────────────────────────────────────
set -g default-terminal 'tmux-256color'
set -ga terminal-overrides ',*256col*:Tc'
set -ga terminal-overrides ',xterm-256color:Tc'
set -sg escape-time 0

# ──────────────────────────────────────────────────────────────
#  Prefix / general
# ──────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind-key C-a last-pane

setw -g mode-keys vi
set -g @shell_mode 'vi'

set -g base-index 1
set-window-option -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set-option -g mouse on

# Preventing scrolling after copying
unbind -T copy-mode-vi MouseDragEnd1Pane

# ──────────────────────────────────────────────────────────────
#  Pane / window navigation
#  C-h/j/k/l smart-switching is handled by vim-tmux-navigator below.
# ──────────────────────────────────────────────────────────────
bind -N "Select pane to the left"  h select-pane -L
bind -N "Select pane below"        j select-pane -D
bind -N "Select pane above"        k select-pane -U
bind -N "Select pane to the right" l select-pane -R
bind-key -N "Previous window" -r C-h select-window -t :-
bind-key -N "Next window"     -r C-l select-window -t :+

bind -N "Resize pane left"  -n S-Left  resize-pane -L 2
bind -N "Resize pane right" -n S-Right resize-pane -R 2
bind -N "Resize pane down"  -n S-Down  resize-pane -D 1
bind -N "Resize pane up"    -n S-Up    resize-pane -U 1

bind-key -N "Split pane below (cwd)"        u split-window -v -c '#{pane_current_path}'
bind-key -N "Split pane right (cwd)"        o split-window -h -c '#{pane_current_path}'
bind-key -N "New window (cwd)"              c new-window     -c '#{pane_current_path}'

bind-key -N "Split pane right and open vim" t split-window -h "vim"

# Watch the latest GitHub Actions run in a split — trigger this right after
# you've kicked off a job. `gh run watch` auto-picks the in-progress run (or
# prompts if there are several); the pane stays open at the end so you can
# read the final status, falling back to a recent-runs list if nothing is
# running. Requires the `gh` CLI.
bind-key -N "Watch latest GitHub Actions run in a split" g split-window -h -c '#{pane_current_path}' \
  "gh run watch || gh run list -L 10; echo; printf 'Press enter to close… '; read _"

# Float the current Spotify track in a centered popup (prefix + S). Reads the
# running app over AppleScript — local, no network. `-E` closes the popup when
# the command exits, so the trailing `sleep` makes it auto-dismiss after ~2s
# (Ctrl-C / q closes it sooner). A popup runs a real shell, so the track text
# never hits tmux's format parser — a name with % or # is safe.
bind-key -N "Show current Spotify track (floating popup)" S \
  display-popup -E -w 64 -h 3 -T ' ♫ now playing ' \
  'printf " %s\n" "$(~/git/dotfiles/tmux/scripts/spotify-now-playing.sh)"; sleep 2'

bind-key -N "Kill the current session" K run-shell 'tmux switch-client -n \; kill-session -t "$(tmux display-message -p "#S")" || tmux kill-session'
bind-key -N "Reload ~/.tmux.conf" r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# ──────────────────────────────────────────────────────────────
#  Command palette  (prefix + ?)
#  A VSCode-style fuzzy finder over every key binding that carries
#  a note (-N). Search by what a command *does* ("github", "reload",
#  "split") and press Enter to RUN it. Bindings above are annotated
#  with -N so they show up here; add -N to anything new.
#  Needs fzf (already used by tmux-sessionx). Execution logic lives
#  in the script so the quoting stays manageable.
# ──────────────────────────────────────────────────────────────
bind-key -N "Search & run key bindings (command palette)" ? \
  display-popup -E -w 80% -h 70% -T ' tmux command palette ' \
  '~/git/dotfiles/tmux/scripts/command-palette.sh'

# ──────────────────────────────────────────────────────────────
#  Agent / pane notifications
#  Bell-based: when a pane finishes (or Claude Code's Stop /
#  Notification hook fires), the window flashes in the status bar.
#  Silence-based: toggle per-window "alert me when this pane has
#  been quiet for N seconds" — useful when an agent is idle.
# ──────────────────────────────────────────────────────────────
set -g monitor-bell on
set -g bell-action other
set -g visual-bell off
set -g visual-silence on

# Activity monitoring stays off by default — agents stream output
# constantly, so it would fire too often. Toggle per-window with
# prefix + m if you want it for a specific pane.
setw -g monitor-activity off
set  -g visual-activity off

bind-key -N "Toggle silence alert for this window (30s)" b if-shell '[ "$(tmux show -wv monitor-silence)" = "0" ]' \
  'setw monitor-silence 30 ; display "silence-alert: ON (30s)"' \
  'setw monitor-silence 0  ; display "silence-alert: OFF"'

bind-key -N "Toggle activity alert for this window" m if-shell '[ "$(tmux show -wv monitor-activity)" = "off" ]' \
  'setw monitor-activity on  ; display "activity-alert: ON"' \
  'setw monitor-activity off ; display "activity-alert: OFF"'


# ──────────────────────────────────────────────────────────────
#  Settings for Claude code 
#  The allow-passthrough line lets notifications and progress updates reach the outer terminal instead of being swallowed by tmux. The extended-keys lines let tmux distinguish Shift+Enter from plain Enter so the newline shortcut works.
# ──────────────────────────────────────────────────────────────
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# ──────────────────────────────────────────────────────────────
#  Copy mode (macOS — pbcopy)
# ──────────────────────────────────────────────────────────────
# copy-pipe-no-clear (not -and-cancel): copy to the clipboard but stay in
# copy mode at the current scroll position, instead of snapping to the live
# bottom. tmux-yank re-binds y on its own, so @yank_action below must match.
bind-key -T copy-mode-vi y send-keys -X copy-pipe-no-clear "pbcopy"
bind-key -T copy-mode-vi v send-keys -X begin-selection

# ──────────────────────────────────────────────────────────────
#  Status bar (Solarized)
# ──────────────────────────────────────────────────────────────
set -g status on
set -g status-bg '#586e75'
set -g status-fg '#eee8d5'
set -g status-justify centre
set -g status-left  'Session: #S'
set -g status-left-length 50

# Right side: a loud SYNC flag when synchronize-panes is on (so you don't
# fat-finger a command into every split), then the git branch of the active
# pane's directory. #() runs the shell, polled at status-interval.
set -g status-interval 15
set -g status-right-length 60
set -g status-right \
  '#{?pane_synchronized,#[fg=#fdf6e3#,bg=#dc322f#,bold] SYNC #[default] ,}#[fg=#073642,bg=#859900,bold] ⎇ #(cd "#{pane_current_path}"; git rev-parse --abbrev-ref HEAD 2>/dev/null) #[default] '

# Window (tab) label. Instead of #{pane_current_command} — which for Claude
# Code resolves to a meaningless version string like "2.1.159" (it renames
# its own process) — show "✳ claude" when the active pane is Claude. Detected
# as: command looks like a version (N.N.N), OR it's `node` with a non-host
# title (Claude-as-node). A real node server keeps its title at the hostname,
# so it stays "node"; vim/shells are untouched. Note: this reflects the
# *active* pane only — tmux's format language can't scan the other splits.
set -g @claude_cmd \
  '#{?#{||:#{m:*.*.*,#{pane_current_command}},#{&&:#{m:node,#{pane_current_command}},#{!=:#{pane_title},#{host}}}},✳ claude,#{pane_current_command}}'

# Active tab: a solid blue pill (matches the active-pane border) so the current
# window is obvious at a glance. Inactive tabs stay dim with no background.
set-window-option -g window-status-current-format \
  '#[fg=#fdf6e3,bg=#268bd2,bold] [#{window_index}] #{?automatic-rename,#{E:@claude_cmd} #{b:pane_current_path},#W} #[default]'
set-window-option -g window-status-format \
  ' #[fg=colour244,bold][#{window_index}] #[fg=colour244]#{?automatic-rename,#{E:@claude_cmd} #{b:pane_current_path},#W} '
# Add a little breathing room between tabs so the active pill stands apart.
set -g window-status-separator ''

# Loud styling for windows with a bell / silence / activity flag —
# this is how you know an agent in another window needs you.
set -g window-status-bell-style     'fg=#fdf6e3,bg=#dc322f,bold'
set -g window-status-activity-style 'fg=#073642,bg=#b58900,bold'

# ──────────────────────────────────────────────────────────────
#  Per-split task labels
#  Claude Code sets each pane's title (pane_title) to the current
#  task, with a glyph for state (✳ idle / braille spinner = working).
#  Show it on each split's top border so a multi-split window gives an
#  at-a-glance overview of what every agent is doing. Plain shells
#  (whose title is just the hostname) fall back to the running command.
# ──────────────────────────────────────────────────────────────
set -g pane-border-status top
# Per-split label: pane index, the task/command, then the pane's own git
# branch in green. The branch comes from #(), which tmux expands per pane
# (using that pane's #{pane_current_path}), so each split shows its own —
# something the status-bar badge can't do. Blank outside a git repo. Like all
# #() segments it refreshes on status-interval, so it can lag a checkout by a
# few seconds.
# Two tmux gotchas avoided here:
#  - No `%s`: tmux runs the format through strftime first, so a literal %s
#    becomes the epoch timestamp before the shell sees it (a number, not text).
#  - No `$shellvar`: tmux's config parser treats `$b` as a variable and escapes
#    it to `\$b`, which the shell then prints literally. `$( )` command
#    substitution is fine. So we pipe git's output straight to sed, which
#    prepends the glyph only when there's a branch (blank outside a repo).
set -g pane-border-format ' #[bold]#P#[nobold] #{?#{==:#{pane_title},#{host}},[#{E:@claude_cmd}],#{pane_title}}#[fg=#859900,bold]#(cd "#{pane_current_path}" 2>/dev/null && git rev-parse --abbrev-ref HEAD 2>/dev/null | sed "s/^/ ⎇ /")#[default] '
set -g pane-border-style        'fg=#586e75'
set -g pane-active-border-style 'fg=#268bd2,bold'

# ──────────────────────────────────────────────────────────────
#  Plugins (TPM)
#  Install with: prefix + I    Update: prefix + U
# ──────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
# Keep the scroll position after yanking instead of snapping to the bottom.
set -g @yank_action 'copy-pipe-no-clear'

# Smart pane switching that's aware of vim/nvim splits.
# Replaces the old hand-rolled is_vim block.
set -g @plugin 'christoomey/vim-tmux-navigator'

# Fast fzf-based session picker — invaluable when juggling
# multiple agent sessions.  prefix + O  to open.
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'O'
set -g @sessionx-window-mode 'on'

# Persistence
set -g @continuum-boot 'on'
set -g @continuum-boot-options 'iterm'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '5'
set -g @resurrect-strategy-vim  'session'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (keep at the very bottom).
run-shell '~/.tmux/plugins/tpm/tpm'
